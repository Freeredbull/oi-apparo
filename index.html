<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OI APPARO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Top Marquee -->
  <div id="marquee-container">
    <div id="marquee-text">🔄 Loading top posts...</div>
  </div>

  <!-- Header area -->
  <div class="top-area">
    <div class="title-area">
      <h1>🐎 OI APPARO 🔥</h1>
    </div>

    <aside class="top-right-panel controls-box">
      <div id="mode-toggle" class="mode-toggle">
        <button id="mode-apparos" class="mode-btn active">🐎 Apparos Mode</button>
        <button id="mode-nixtop" class="mode-btn">🦇 Nixtopapparos Mode</button>
      </div>

      <div id="online-count">🟢 loading...</div>

      <button id="apparos-near-btn">🔞 APPARES NEAR YOU 🔞</button>

      <div id="apparos-message" style="margin-top: 10px; display: none; color: #0f0; font-weight: bold;">
        OI APPARO POU ENA SOU DIKSO APPARES
      </div>

      <!-- APPAROLEKSI TIS IMERAS -->
      <section class="apparoleksi-box">
        <h3>🧩 APPAROLEKSI TIS IMERAS</h3>

        <div id="wordle-length">🔤 loading...</div>

        <div id="wordle-grid"></div>

        <input
          type="text"
          id="wordle-input"
          placeholder="γράψε λέξη ρε apparo"
          autocomplete="off"
        />

        <div class="keyboard-note">πάτα γράμματα στα ελληνικά 👇</div>

        <div id="greek-keyboard" class="greek-keyboard">
          <div class="keyboard-row">
            <button type="button" class="greek-key" data-letter="α">α</button>
            <button type="button" class="greek-key" data-letter="β">β</button>
            <button type="button" class="greek-key" data-letter="γ">γ</button>
            <button type="button" class="greek-key" data-letter="δ">δ</button>
            <button type="button" class="greek-key" data-letter="ε">ε</button>
            <button type="button" class="greek-key" data-letter="ζ">ζ</button>
            <button type="button" class="greek-key" data-letter="η">η</button>
            <button type="button" class="greek-key" data-letter="θ">θ</button>
            <button type="button" class="greek-key" data-letter="ι">ι</button>
            <button type="button" class="greek-key" data-letter="κ">κ</button>
          </div>

          <div class="keyboard-row">
            <button type="button" class="greek-key" data-letter="λ">λ</button>
            <button type="button" class="greek-key" data-letter="μ">μ</button>
            <button type="button" class="greek-key" data-letter="ν">ν</button>
            <button type="button" class="greek-key" data-letter="ξ">ξ</button>
            <button type="button" class="greek-key" data-letter="ο">ο</button>
            <button type="button" class="greek-key" data-letter="π">π</button>
            <button type="button" class="greek-key" data-letter="ρ">ρ</button>
            <button type="button" class="greek-key" data-letter="σ">σ</button>
            <button type="button" class="greek-key" data-letter="τ">τ</button>
            <button type="button" class="greek-key" data-letter="υ">υ</button>
          </div>

          <div class="keyboard-row">
            <button type="button" class="greek-key" data-letter="φ">φ</button>
            <button type="button" class="greek-key" data-letter="χ">χ</button>
            <button type="button" class="greek-key" data-letter="ψ">ψ</button>
            <button type="button" class="greek-key" data-letter="ω">ω</button>
            <button type="button" class="greek-key" data-letter="ς">ς</button>
            <button type="button" class="greek-key keyboard-action" id="wordle-backspace">⌫</button>
            <button type="button" class="greek-key keyboard-action" id="wordle-clear">clear</button>
          </div>
        </div>

        <button type="button" id="wordle-submit">μαντέψε</button>

        <div id="wordle-message"></div>
      </section>
    </aside>
  </div>

  <!-- Main content -->
  <main class="container social-layout">
    <!-- Post Form -->
    <section class="post-form">
      <textarea id="postContent" placeholder="Oi Apparo, τι έγινε σήμερα;"></textarea>

      <div class="image-source-options">
        <div>
          <label>
            <input type="radio" name="image-source" value="upload" checked>
            📁 Upload
          </label>
        </div>

        <div id="upload-section">
          <input type="file" id="postImage" accept="image/*" />
        </div>

        <div>
          <label>
            <input type="radio" name="image-source" value="draw">
            ✏️ Draw
          </label>
        </div>

        <div id="draw-launch" style="margin-top: 6px; display: none;">
          <button type="button" id="draw-btn">🎨 Open Draw Pad</button>
        </div>

        <div id="draw-preview" style="margin-top: 10px; display: none; color: #0f0; font-size: 0.85rem;">
          ✅ Drawing saved and ready to post.
        </div>

        <input type="hidden" id="image-url-input" />
      </div>

      <button type="button" onclick="submitPost()">📨 Post</button>
    </section>

    <!-- Feed -->
    <section class="feed-column">
      <div id="posts"></div>
    </section>
  </main>

  <!-- Drawing Pad Modal -->
  <div id="draw-modal" style="display:none; position: fixed; top: 10%; left: 50%; transform: translateX(-50%); background: black; padding: 10px; border: 2px solid green; z-index: 1000;">
    <div style="margin-bottom: 8px;">
      <button id="select-horse">🐎 Horse</button>
      <button id="select-bat">🦇 Bat</button>
    </div>

    <canvas id="draw-canvas" width="300" height="300" style="border:2px solid green; background:black;"></canvas>

    <div style="margin-top:10px;">
      <button id="draw-tool">🖌 Draw</button>
      <button id="erase-tool">🧽 Erase</button>
      <button id="clear-drawing">🧹 Clear</button>
      <button id="save-drawing">✅ Save</button>
      <button id="close-drawing">❌ Cancel</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
